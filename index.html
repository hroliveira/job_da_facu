<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Academic Work Manager — Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#3B82F6' },
          fontFamily: { display: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }
    .glass-card {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.5s ease forwards; }
    .dot-pattern {
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }
  </style>
</head>
<body class="gradient-bg dot-pattern min-h-screen flex items-center justify-center p-4">

  <!-- Decorative blobs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md animate-in relative z-10">
    <!-- Logo + Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl shadow-2xl shadow-primary/40 mb-4">
        <span class="material-symbols-outlined text-white text-3xl">school</span>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight">Academic Work Manager</h1>
      <p class="text-slate-400 text-sm mt-2">Gerencie seus trabalhos acadêmicos com eficiência</p>
    </div>

    <!-- Card -->
    <div class="glass-card rounded-3xl shadow-2xl p-8">
      <!-- Tabs -->
      <div class="flex bg-slate-100 rounded-xl p-1 mb-8">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all bg-white text-slate-900 shadow-sm">
          Entrar
        </button>
        <button id="tab-signup" onclick="switchTab('signup')"
          class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-slate-500">
          Criar Conta
        </button>
      </div>

      <!-- LOGIN FORM -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Email</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">email</span>
              <input id="login-email" type="email" required
                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
                placeholder="seu@email.com"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Senha</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
              <input id="login-password" type="password" required
                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
                placeholder="••••••••"/>
            </div>
          </div>
          <div id="login-error" class="hidden text-xs font-medium text-rose-600 bg-rose-50 px-3 py-2 rounded-lg"></div>
          <button type="submit" id="btn-login"
            class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-primary/30 flex items-center justify-center gap-2 text-sm">
            <span class="material-symbols-outlined text-lg">login</span>
            Entrar na Conta
          </button>
        </div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="form-signup" class="hidden" onsubmit="handleSignup(event)">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Nome Completo <span class="text-rose-500">*</span></label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">person</span>
              <input id="signup-name" type="text" required
                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
                placeholder="João da Silva"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Email <span class="text-rose-500">*</span></label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">email</span>
              <input id="signup-email" type="email" required
                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
                placeholder="seu@email.com"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Senha <span class="text-rose-500">*</span></label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
              <input id="signup-password" type="password" required minlength="6"
                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
                placeholder="mínimo 6 caracteres"/>
            </div>
          </div>
          <div id="signup-error" class="hidden text-xs font-medium text-rose-600 bg-rose-50 px-3 py-2 rounded-lg"></div>
          <div id="signup-success" class="hidden text-xs font-medium text-emerald-600 bg-emerald-50 px-3 py-2 rounded-lg"></div>
          <button type="submit" id="btn-signup"
            class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-primary/30 flex items-center justify-center gap-2 text-sm">
            <span class="material-symbols-outlined text-lg">person_add</span>
            Criar Minha Conta
          </button>
        </div>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      Academic Work Manager &copy; 2026 — Todos os direitos reservados
    </p>
  </div>

  <script type="module">
    import { signIn, signUp, getSession, onAuthStateChange } from './src/services/authService.js';

    // Trata o callback de confirmação de email (#access_token na URL)
    // O SDK do Supabase processa o hash de forma assíncrona e dispara onAuthStateChange
    const { data: { subscription } } = onAuthStateChange((event, session) => {
      if (session && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED')) {
        subscription.unsubscribe();
        window.location.href = './app.html';
      }
    });

    // Redireciona se já estiver logado (acesso normal)
    (async () => {
      const session = await getSession();
      if (session) {
        subscription.unsubscribe();
        window.location.href = './app.html';
      }
    })();

    window.switchTab = function(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-signup').classList.toggle('hidden', isLogin);

      const tabLogin  = document.getElementById('tab-login');
      const tabSignup = document.getElementById('tab-signup');
      tabLogin.className  = `flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${isLogin  ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`;
      tabSignup.className = `flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${!isLogin ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`;
    };

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.7' : '1';
    }

    window.handleLogin = async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      setLoading('btn-login', true);
      try {
        const email    = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        await signIn(email, password);
        window.location.href = './app.html';
      } catch (err) {
        errEl.textContent = err.message === 'Invalid login credentials'
          ? 'Email ou senha incorretos.' : err.message;
        errEl.classList.remove('hidden');
      } finally {
        setLoading('btn-login', false);
      }
    };

    window.handleSignup = async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('signup-error');
      const sucEl = document.getElementById('signup-success');
      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');
      setLoading('btn-signup', true);
      try {
        const name     = document.getElementById('signup-name').value;
        const email    = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        await signUp(email, password, name);
        sucEl.textContent = '✅ Conta criada! Verifique seu email e clique no link de confirmação.';
        sucEl.classList.remove('hidden');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        setLoading('btn-signup', false);
      }
    };
  </script>
</body>
</html>
