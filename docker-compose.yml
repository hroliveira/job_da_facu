version: '3.8'

services:
  app:
    build: .
    container_name: academic-work-manager
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
